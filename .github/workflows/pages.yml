name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Inject API Keys
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          USDA_KEY: ${{ secrets.USDA_API_KEY }}
          GROK_KEY: ${{ secrets.GROK_API_KEY }}
        run: python3 -c "import os,pathlib; gk=os.environ['GEMINI_KEY']; uk=os.environ['USDA_KEY']; xk=os.environ['GROK_KEY']; [pathlib.Path(f).write_text(pathlib.Path(f).read_text(encoding='utf-8').replace('%%GEMINI_API_KEY%%',gk).replace('%%USDA_API_KEY%%',uk).replace('%%GROK_API_KEY%%',xk),encoding='utf-8') for f in ['index.html','nahrungsergaenzungsmittel-experte.html']]; print('Done')"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
